[workspace]
name = "peak-head-tracking"
version = "1.0.0"
description = "Head tracking mod for PEAK using CameraUnlock shared library"
channels = ["conda-forge"]
platforms = ["win-64"]

[tasks]
sync = "git submodule update --remote cameraunlock-core"
setup = "powershell -ExecutionPolicy Bypass -File scripts/setup-libs.ps1"
setup-game = "powershell -ExecutionPolicy Bypass -File scripts/setup-libs.ps1 -UseGameDlls"
restore = { cmd = "dotnet restore src/PeakHeadTracking/PeakHeadTracking.csproj", depends-on = ["setup"] }
build = { cmd = "dotnet build src/PeakHeadTracking/PeakHeadTracking.csproj -c Release", depends-on = ["restore"] }
install = { cmd = "powershell -ExecutionPolicy Bypass -File scripts/deploy.ps1 Release", depends-on = ["build"] }
package = { cmd = "powershell -ExecutionPolicy Bypass -File scripts/package-release.ps1", depends-on = ["build"] }
uninstall = "scripts\\uninstall.cmd"
clean = "dotnet clean src/PeakHeadTracking/PeakHeadTracking.csproj"
release = "powershell -ExecutionPolicy Bypass -File scripts/release.ps1"
release-force = "powershell -ExecutionPolicy Bypass -File scripts/release.ps1 -Force"
