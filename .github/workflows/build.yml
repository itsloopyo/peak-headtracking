name: Build

on:
  push:
    branches: ['**']
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'

jobs:
  build:
    name: Build and Validate
    runs-on: windows-latest
    if: ${{ !startsWith(github.event.head_commit.message, 'Release v') }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Download BepInEx
        shell: pwsh
        run: |
          Write-Host "Downloading BepInEx 5.4.23.4..." -ForegroundColor Cyan

          $bepinexUrl = "https://github.com/BepInEx/BepInEx/releases/download/v5.4.23.4/BepInEx_win_x64_5.4.23.4.zip"
          $expectedHash = "F881201B79DA03E513BF97CDF39607FFA7F9E0D31A519B1AEECA8EB60F8309E7"

          Invoke-WebRequest -Uri $bepinexUrl -OutFile bepinex.zip

          $actualHash = (Get-FileHash -Path bepinex.zip -Algorithm SHA256).Hash
          if ($actualHash -ne $expectedHash) {
            Write-Host "::error::BepInEx hash mismatch!"
            Write-Host "::error::Expected: $expectedHash"
            Write-Host "::error::Got: $actualHash"
            exit 1
          }

          Write-Host "BepInEx download verified" -ForegroundColor Green

          $libsPath = "lib"
          Expand-Archive -Path bepinex.zip -DestinationPath bepinex-temp
          New-Item -ItemType Directory -Path $libsPath -Force | Out-Null
          Copy-Item bepinex-temp/BepInEx/core/BepInEx.dll $libsPath/
          Copy-Item bepinex-temp/BepInEx/core/0Harmony.dll $libsPath/

          Remove-Item bepinex.zip
          Remove-Item -Recurse bepinex-temp

          Write-Host "BepInEx DLLs extracted to $libsPath" -ForegroundColor Green

      - name: Create Unity stub assemblies for CI
        shell: pwsh
        run: |
          Write-Host "Creating Unity stub assemblies for CI build..." -ForegroundColor Cyan

          $libsPath = "lib"

          # Build UnityEngine.dll with all types from the checked-in UnityStubs.cs
          $projContent = @"
          <Project Sdk="Microsoft.NET.Sdk">
            <PropertyGroup>
              <TargetFramework>net472</TargetFramework>
              <LangVersion>9.0</LangVersion>
              <AssemblyName>UnityEngine</AssemblyName>
              <NoWarn>CS0169;CS0649;CS0067;CS0660;CS0661</NoWarn>
            </PropertyGroup>
            <ItemGroup>
              <Compile Include="UnityStubs.cs" />
            </ItemGroup>
          </Project>
          "@
          $projPath = Join-Path $libsPath "Stub_UnityEngine.csproj"
          $projContent | Out-File -FilePath $projPath -Encoding utf8

          dotnet build $projPath -c Release -o $libsPath --nologo -v q
          if ($LASTEXITCODE -ne 0) {
              Write-Host "::error::Failed to build UnityEngine stub"
              exit 1
          }
          Write-Host "  Created UnityEngine.dll (with types)" -ForegroundColor Green
          Remove-Item $projPath -ErrorAction SilentlyContinue

          # Build empty stubs for other Unity modules (to satisfy reference requirements)
          $emptySource = "// Empty stub assembly"
          $emptySourcePath = Join-Path $libsPath "EmptyStub.cs"
          $emptySource | Out-File -FilePath $emptySourcePath -Encoding utf8

          # Build UnityEngine.UI.dll from UnityUIStubs.cs (references UnityEngine.dll)
          $uiProjContent = @"
          <Project Sdk="Microsoft.NET.Sdk">
            <PropertyGroup>
              <TargetFramework>net472</TargetFramework>
              <LangVersion>9.0</LangVersion>
              <AssemblyName>UnityEngine.UI</AssemblyName>
              <NoWarn>CS0169;CS0649;CS0067;CS0660;CS0661</NoWarn>
            </PropertyGroup>
            <ItemGroup>
              <Compile Include="UnityUIStubs.cs" />
              <Reference Include="UnityEngine"><HintPath>UnityEngine.dll</HintPath></Reference>
            </ItemGroup>
          </Project>
          "@
          $uiProjPath = Join-Path $libsPath "Stub_UnityEngine.UI.csproj"
          $uiProjContent | Out-File -FilePath $uiProjPath -Encoding utf8

          dotnet build $uiProjPath -c Release -o $libsPath --nologo -v q
          if ($LASTEXITCODE -ne 0) {
              Write-Host "::error::Failed to build UnityEngine.UI stub"
              exit 1
          }
          Write-Host "  Created UnityEngine.UI.dll (with types)" -ForegroundColor Green
          Remove-Item $uiProjPath -ErrorAction SilentlyContinue

          $emptyModules = @(
              "UnityEngine.CoreModule",
              "UnityEngine.IMGUIModule",
              "UnityEngine.UIModule",
              "UnityEngine.InputLegacyModule",
              "UnityEngine.TextRenderingModule",
              "UnityEngine.AnimationModule",
              "UnityEngine.PhysicsModule"
          )

          foreach ($moduleName in $emptyModules) {
              $emptyProjContent = @"
          <Project Sdk="Microsoft.NET.Sdk">
            <PropertyGroup>
              <TargetFramework>net472</TargetFramework>
              <LangVersion>9.0</LangVersion>
              <AssemblyName>$moduleName</AssemblyName>
            </PropertyGroup>
            <ItemGroup>
              <Compile Include="EmptyStub.cs" />
            </ItemGroup>
          </Project>
          "@
              $emptyProjPath = Join-Path $libsPath "Stub_$moduleName.csproj"
              $emptyProjContent | Out-File -FilePath $emptyProjPath -Encoding utf8

              dotnet build $emptyProjPath -c Release -o $libsPath --nologo -v q
              if ($LASTEXITCODE -ne 0) {
                  Write-Host "::error::Failed to build $moduleName stub"
                  exit 1
              }
              Write-Host "  Created $moduleName.dll (empty)" -ForegroundColor Green
              Remove-Item $emptyProjPath -ErrorAction SilentlyContinue
          }

          # Cleanup temp files
          Remove-Item $emptySourcePath -ErrorAction SilentlyContinue
          Remove-Item (Join-Path $libsPath "*.deps.json") -Force -ErrorAction SilentlyContinue
          Remove-Item (Join-Path $libsPath "*.pdb") -Force -ErrorAction SilentlyContinue
          Remove-Item (Join-Path $libsPath "obj") -Recurse -Force -ErrorAction SilentlyContinue

          Write-Host "Unity stub assemblies created successfully" -ForegroundColor Green

      - name: Restore NuGet packages
        shell: pwsh
        run: |
          $unityPath = "${{ github.workspace }}\lib"
          dotnet restore src/PeakHeadTracking/PeakHeadTracking.csproj "-p:UnityEnginePath=$unityPath"

      - name: Build Debug
        shell: pwsh
        run: |
          Write-Host "Building debug configuration..." -ForegroundColor Cyan
          $unityPath = "${{ github.workspace }}\lib"
          dotnet build src/PeakHeadTracking/PeakHeadTracking.csproj --configuration Debug "-p:UnityEnginePath=$unityPath"

          if ($LASTEXITCODE -ne 0) {
            Write-Host "::error::Debug build failed"
            exit 1
          }

          Write-Host "Debug build succeeded" -ForegroundColor Green

      - name: Build Release
        shell: pwsh
        run: |
          Write-Host "Building release configuration..." -ForegroundColor Cyan
          $unityPath = "${{ github.workspace }}\lib"
          dotnet build src/PeakHeadTracking/PeakHeadTracking.csproj --configuration Release "-p:UnityEnginePath=$unityPath"

          if ($LASTEXITCODE -ne 0) {
            Write-Host "::error::Release build failed"
            exit 1
          }

          Write-Host "Release build succeeded" -ForegroundColor Green

      - name: Verify build outputs
        shell: pwsh
        run: |
          Write-Host "Verifying build outputs..." -ForegroundColor Cyan

          $requiredFiles = @(
            "src/PeakHeadTracking/bin/Debug/net472/PeakHeadTracking.dll",
            "src/PeakHeadTracking/bin/Release/net472/PeakHeadTracking.dll"
          )

          $allExist = $true
          foreach ($file in $requiredFiles) {
            if (Test-Path $file) {
              $size = (Get-Item $file).Length / 1KB
              Write-Host "  $file ($([math]::Round($size, 2)) KB)" -ForegroundColor Green
            } else {
              Write-Host "  Missing: $file" -ForegroundColor Red
              $allExist = $false
            }
          }

          if (-not $allExist) {
            Write-Host "::error::Some build outputs are missing"
            exit 1
          }

          Write-Host "All build outputs verified" -ForegroundColor Green

      - name: Package installer
        shell: pwsh
        run: |
          Write-Host "Packaging installer ZIP..." -ForegroundColor Cyan
          powershell -ExecutionPolicy Bypass -File scripts/package-release.ps1

          if ($LASTEXITCODE -ne 0) {
            Write-Host "::error::Packaging failed"
            exit 1
          }

          Write-Host "Package created" -ForegroundColor Green

      - name: Upload installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: PeakHeadTracking-installer
          path: release/*-installer.zip
          retention-days: 14
          if-no-files-found: error
